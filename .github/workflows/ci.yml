name: CI Audit and Lint

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Check dependencies for vulnerabilities
        run: npm audit --json --audit-level=high > audit-report.json 2>&1 || true

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: npm-audit-report
          path: audit-report.json
          retention-days: 7

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint
        continue-on-error: true

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check code formatting
        run: npm run format -- --check
        continue-on-error: true

  env-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check repository structure
        run: |
          echo "Checking project structure..."
          ls -la
          test -f "package.json" && echo "✓ package.json exists"
          test -f "playwright.config.ts" && echo "✓ playwright.config.ts exists"
          test -f "Dockerfile" && echo "✓ Dockerfile exists"
          test -d "tests" && echo "✓ tests directory exists"
          test -f ".env.example" && echo "✓ .env.example exists"
